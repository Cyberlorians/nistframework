name: Build Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'practices/*.yaml'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build CSV from YAML practices
        run: python scripts/build_csv.py

      - name: Build Query Pack JSON
        run: python scripts/build_querypack.py

      - name: Commit built artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: rebuild output artifacts [skip ci]"
          git push
