# NIST 800-171 Rev.2 Control 3.8.4
# Family: Media Protection
# Mark media with necessary CUI markings and distribution limitations.

control: "3.8.4"
name: "Mark media with CUI markings"
family: "Media Protection"

alignments:
  - product: "Microsoft Purview"
    workload: "Sensitivity Labels"
    table: "CloudAppEvents"
    kql: |
      // NIST 3.8.4 - Sensitivity Label Application via Cloud Apps
      // Part 0: Analyst-Driven Targeting
      let TargetUsers = dynamic(["*"]);
      let TargetActions = dynamic(["FileSensitivityLabelApplied", "FileSensitivityLabelChanged", "FileSensitivityLabelRemoved"]);
      let LookbackDays = 30;
      // Part 1: Base Filter
      CloudAppEvents
      | where TimeGenerated > ago(LookbackDays * 1d)
      | where ActionType has_any (TargetActions)
      | where (AccountId has_any (TargetUsers) or TargetUsers has "*")
      // Final Output
      | project TimeGenerated, ActionType, AccountId, Application, ObjectName, ObjectType, IPAddress, CountryCode
      | sort by TimeGenerated desc
      | take 50

  - product: "Microsoft Purview"
    workload: "Auto-Labeling"
    table: "InformationProtectionEvents_CL"
    kql: |
      // NIST 3.8.4 - Auto and Manual Label Application Events
      // Part 0: Analyst-Driven Targeting
      let TargetLabels = dynamic(["*"]);
      let TargetUsers = dynamic(["*"]);
      let LookbackDays = 30;
      // Part 1: Base Filter
      InformationProtectionEvents_CL
      | where TimeGenerated > ago(LookbackDays * 1d)
      | where (LabelName_s has_any (TargetLabels) or TargetLabels has "*")
      | where (UserId_s has_any (TargetUsers) or TargetUsers has "*")
      // Part 2: Enrichment
      | extend IsAutoLabel = Activity_s has "auto"
      // Final Output
      | project TimeGenerated, UserId_s, LabelName_s, Activity_s, ObjectId_s, MachineName_s, Application_s, IsAutoLabel
      | sort by TimeGenerated desc
      | take 50

  - product: "Microsoft Purview"
    workload: "DLP Labeling"
    table: "DLPActionEvents"
    kql: |
      // NIST 3.8.4 - DLP Enforcement on Unlabeled/Mislabeled Content
      // Part 0: Analyst-Driven Targeting
      let TargetPolicies = dynamic(["*"]);
      let LookbackDays = 30;
      // Part 1: Base Filter
      DLPActionEvents
      | where TimeGenerated > ago(LookbackDays * 1d)
      | where (PolicyName has_any (TargetPolicies) or TargetPolicies has "*")
      // Final Output
      | project TimeGenerated, PolicyName, RuleName, ActionType, TargetFilePath, AccountName, Severity, SensitiveInfoTypeData
      | sort by TimeGenerated desc
      | take 50

  - product: "Microsoft 365"
    workload: "Label Activity"
    table: "OfficeActivity"
    kql: |
      // NIST 3.8.4 - Office 365 File Label Modifications
      // Part 0: Analyst-Driven Targeting
      let TargetUsers = dynamic(["*"]);
      let TargetOperations = dynamic(["SensitivityLabelApplied", "SensitivityLabelUpdated", "SensitivityLabelRemoved", "FileSensitivityLabelApplied", "FileSensitivityLabelChanged"]);
      let LookbackDays = 30;
      // Part 1: Base Filter
      OfficeActivity
      | where TimeGenerated > ago(LookbackDays * 1d)
      | where Operation has_any (TargetOperations)
      | where (UserId has_any (TargetUsers) or TargetUsers has "*")
      // Final Output
      | project TimeGenerated, UserId, Operation, OfficeObjectId, Site_Url, OfficeWorkload, ClientIP
      | sort by TimeGenerated desc
      | take 50

  - product: "Microsoft Purview"
    workload: "Label Audit"
    table: "AuditLogs"
    kql: |
      // NIST 3.8.4 - Label Policy Configuration Changes
      // Part 0: Analyst-Driven Targeting
      let TargetOperations = dynamic(["Set-Label", "New-Label", "Remove-Label", "Set-LabelPolicy", "New-LabelPolicy", "Remove-LabelPolicy"]);
      let LookbackDays = 90;
      // Part 1: Base Filter
      AuditLogs
      | where TimeGenerated > ago(LookbackDays * 1d)
      | where OperationName has_any (TargetOperations)
      // Part 2: Enrichment
      | extend InitiatedBy_User = tostring(InitiatedBy.user.userPrincipalName)
      | extend TargetName = tostring(TargetResources[0].displayName)
      // Final Output
      | project TimeGenerated, OperationName, InitiatedBy_User, TargetName, Result
      | sort by TimeGenerated desc
      | take 50
