# NIST 800-171 Rev.2 Control 3.14.1
# Family: System and Information Integrity
# Identify, report, and correct information and information system flaws in a timely manner.

control: "3.14.1"
name: "Identify, report, and correct system flaws"
family: "System and Information Integrity"

alignments:
  - product: "Microsoft Defender for Endpoint"
    workload: "Vulnerability Mgmt"
    table: "DeviceTvmSoftwareVulnerabilities"
    kql: |
      // NIST 3.14.1 - Software Vulnerability Inventory
      // Part 0: Analyst-Driven Targeting
      let TargetDevices = dynamic(["*"]);
      let TargetSeverities = dynamic([]);    // e.g., ["Critical", "High", "Medium"]
      // Part 1: Base Filter
      DeviceTvmSoftwareVulnerabilities
      | where Timestamp > ago(1d)
      | where (DeviceName has_any (TargetDevices) or TargetDevices has "*")
      | where (array_length(TargetSeverities) == 0 or VulnerabilitySeverityLevel has_any (TargetSeverities))
      // Part 2: Enrichment
      | summarize
          AffectedDevices = dcount(DeviceId),
          DeviceList = make_set(DeviceName, 10)
        by CveId, SoftwareName, SoftwareVersion, VulnerabilitySeverityLevel
      // Final Output
      | project CveId, SoftwareName, SoftwareVersion, VulnerabilitySeverityLevel, AffectedDevices, DeviceList
      | sort by VulnerabilitySeverityLevel asc, AffectedDevices desc
      | take 50

  - product: "Microsoft Defender for Endpoint"
    workload: "KB / Patch Assessment"
    table: "DeviceTvmSoftwareVulnerabilitiesKB"
    kql: |
      // NIST 3.14.1 - CVE Knowledge Base Enrichment
      // Part 0: Analyst-Driven Targeting
      let TargetCVEs = dynamic(["*"]);
      let MinCVSS = 7.0;
      // Part 1: Base Filter
      DeviceTvmSoftwareVulnerabilitiesKB
      | where (CveId has_any (TargetCVEs) or TargetCVEs has "*")
      | where CvssScore >= MinCVSS
      // Part 2: Enrichment
      | extend IsExploitAvailable = IsExploitAvailable == true
      | extend HasPublicExploit = IsExploitVerified == true
      // Final Output
      | project CveId, CvssScore, VulnerabilityDescription, IsExploitAvailable, HasPublicExploit, AffectedSoftware, PublishedDate, LastModifiedDateTime
      | sort by CvssScore desc
      | take 50

  - product: "Microsoft Defender for Cloud"
    workload: "Security Recommendations"
    table: "SecurityRecommendation"
    kql: |
      // NIST 3.14.1 - Active Security Recommendations (Flaws)
      // Part 0: Analyst-Driven Targeting
      let TargetSeverities = dynamic([]);    // e.g., ["High", "Medium"]
      // Part 1: Base Filter
      SecurityRecommendation
      | where RecommendationState == "Active"
      | where (array_length(TargetSeverities) == 0 or RecommendationSeverity has_any (TargetSeverities))
      // Part 2: Enrichment
      | extend ResourceName = tostring(Properties.resourceName)
      | extend IsPreview = tostring(Properties.isPreview)
      // Final Output
      | project TimeGenerated, RecommendationDisplayName, RecommendationSeverity, ResourceName, Description, RemediationDescription, IsPreview
      | sort by RecommendationSeverity asc
      | take 50

  - product: "Microsoft Defender for Cloud"
    workload: "Regulatory Compliance"
    table: "SecurityRegulatoryCompliance"
    kql: |
      // NIST 3.14.1 - Regulatory Compliance Status (NIST 800-171)
      // Part 0: Analyst-Driven Targeting
      let TargetStandards = dynamic(["*"]);
      let TargetStates = dynamic([]);    // e.g., ["Failed", "Unsupported"]
      // Part 1: Base Filter
      SecurityRegulatoryCompliance
      | where TimeGenerated > ago(1d)
      | where (array_length(TargetStates) == 0 or State has_any (TargetStates))
      | where (RegulatoryComplianceStandardName has_any (TargetStandards) or TargetStandards has "*")
      // Final Output
      | project TimeGenerated, RegulatoryComplianceStandardName, RegulatoryComplianceControlName, State, FailedResources, PassedResources, SkippedResources, Description
      | sort by FailedResources desc
      | take 50

  - product: "Microsoft Defender for Endpoint"
    workload: "Software Inventory"
    table: "DeviceTvmSoftwareInventory"
    kql: |
      // NIST 3.14.1 - Software Inventory with EOL Detection
      // Part 0: Analyst-Driven Targeting
      let TargetDevices = dynamic(["*"]);
      let TargetSoftware = dynamic(["*"]);
      // Part 1: Base Filter
      DeviceTvmSoftwareInventory
      | where Timestamp > ago(1d)
      | where (DeviceName has_any (TargetDevices) or TargetDevices has "*")
      | where (SoftwareName has_any (TargetSoftware) or TargetSoftware has "*")
      // Part 2: Enrichment
      | extend IsEOL = EndOfSupportStatus has "EOS"
      | summarize DeviceCount = dcount(DeviceId) by SoftwareName, SoftwareVersion, SoftwareVendor, IsEOL, EndOfSupportStatus, EndOfSupportDate
      // Final Output
      | project SoftwareName, SoftwareVersion, SoftwareVendor, DeviceCount, IsEOL, EndOfSupportStatus, EndOfSupportDate
      | sort by IsEOL desc, DeviceCount desc
      | take 50

  - product: "Microsoft Intune"
    workload: "Update Compliance"
    table: "IntuneDevices"
    kql: |
      // NIST 3.14.1 - Device OS Patch Level Assessment
      // Part 0: Analyst-Driven Targeting
      let TargetOS = dynamic(["*"]);
      // Part 1: Base Filter
      IntuneDevices
      | where TimeGenerated > ago(1d)
      | where (OS has_any (TargetOS) or TargetOS has "*")
      // Part 2: Enrichment
      | summarize arg_max(TimeGenerated, *) by DeviceId
      | extend DaysSinceContact = datetime_diff('day', now(), LastContact)
      // Final Output
      | project TimeGenerated, DeviceName, UserName, OS, OSVersion, ComplianceState, LastContact, DaysSinceContact, Model, SerialNumber
      | sort by OSVersion asc, DaysSinceContact desc
      | take 50

  - product: "Azure"
    workload: "Resource Health"
    table: "AzureActivity"
    kql: |
      // NIST 3.14.1 - Azure Resource Health and Remediation Actions
      // Part 0: Analyst-Driven Targeting
      let TargetOperations = dynamic([]);    // e.g., ["Microsoft.Security/tasks/resolve/action", "Microsoft.Security/tasks/dismiss/action", "Microsoft.Advisor/recommendations/read"]
      let LookbackDays = 30;
      // Part 1: Base Filter
      AzureActivity
      | where TimeGenerated > ago(LookbackDays * 1d)
      | where (array_length(TargetOperations) == 0 or OperationNameValue has_any (TargetOperations)) or CategoryValue == "Recommendation"
      // Final Output
      | project TimeGenerated, Caller, OperationNameValue, ResourceGroup, Resource, ActivityStatusValue, Level
      | sort by TimeGenerated desc
      | take 50
